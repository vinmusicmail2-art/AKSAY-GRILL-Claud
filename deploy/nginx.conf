server {
    listen 80;
    server_name aksaygril.ru www.aksaygril.ru;

    # Перенаправление HTTP → HTTPS (раскомментировать после выпуска SSL)
    # return 301 https://$host$request_uri;

    client_max_body_size 16M;

    # Статические файлы — отдаёт nginx напрямую (без Flask)
    location /assets/ {
        alias /var/www/aksaygril/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Все остальные запросы — проксируем на gunicorn
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}

